server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://123.206.104.63:3306/citicup?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:citicup_user}
    password: ${SPRING_DATASOURCE_PASSWORD:citicup123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      repositories:
        enabled: false

  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  model-service:
    base-url: ${APP_MODEL_SERVICE_BASE_URL:http://localhost:8000}
  agent-service:
    base-url: ${APP_AGENT_SERVICE_BASE_URL:http://localhost:8001}
  cache:
    ttl-seconds: 120

  proxy:
    host: ${APP_PROXY_HOST:}
    port: ${APP_PROXY_PORT:7897}

  oilprice:
    api:
      url: https://api.oilpriceapi.com/v1/prices/latest
      token: ${APP_OILPRICE_API_TOKEN:YOUR_OIL_API_TOKEN}
  llm:
    api-key: ${APP_LLM_API_KEY:YOUR_LLM_API_KEY}
    url: https://api.deepseek.com/chat/completions

  explainability:
    base-dir: ${APP_EXPLAINABILITY_BASE_DIR:./explainability}
    asset-url-prefix: ${APP_EXPLAINABILITY_ASSET_URL_PREFIX:/explainability-assets}

stage2:
  base-url: ${STAGE2_BASE_URL:http://localhost:8002}