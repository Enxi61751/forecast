server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://123.206.104.63:3306/citicup?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: citicup_user
    password: citicup123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      repositories:
        enabled: false

  jackson:
    property-naming-strategy: SNAKE_CASE

app:
  model-service:
    base-url: http://localhost:8000  # model-remote FastAPI (predict + sentiment)
  agent-service:
    base-url: http://localhost:8001  # stagex2 agent simulation service
  cache:
    ttl-seconds: 120

  # 外部 API 代理（如油价 API 需要代理才能访问，填写代理地址；不需要则留空）
  proxy:
    host: ""      # 例：172.29.0.1，留空则直连
    port: 7897

  oilprice:
    api:
      url: https://api.oilpriceapi.com/v1/prices/latest
      token: YOUR_OIL_API_TOKEN
  llm:
    api-key: YOUR_LLM_API_KEY
    url: https://api.deepseek.com/chat/completions

stage2:
  base-url: http://localhost:8002


  