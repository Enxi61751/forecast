server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/citicup?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379

app:
  model-service:
    base-url: http://localhost:8000  # FastAPI
  cache:
    ttl-seconds: 120