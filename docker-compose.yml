services:
  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Model Service (model-remote branch, port 8000) ─────
  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile
    restart: always
    environment:
      MODEL_DIR: /app/model-artifacts
      USE_STUB: ${USE_STUB:-0}
    volumes:
      - ./model-artifacts:/app/model-artifacts:ro
    deploy:
      resources:
        limits:
          memory: 400m

  # ── Agent Service (agent branch, port 8001) ──────────────────────────
  agent-service:
    build:
      context: ./agent-src/agent-service
    restart: always
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      STAGEX2_MODEL: ${STAGEX2_MODEL:-deepseek-chat}
      STAGEX2_BASE_URL: ${STAGEX2_BASE_URL:-https://api.deepseek.com}
      STAGEX2_SENTIMENT_PROVIDER: ${STAGEX2_SENTIMENT_PROVIDER:-llm}
      STAGEX2_SENTIMENT_BASE_URL: ${STAGEX2_SENTIMENT_BASE_URL:-https://api.deepseek.com/v1}
      STAGEX2_SENTIMENT_MODEL: ${STAGEX2_SENTIMENT_MODEL:-deepseek-chat}
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Spring Boot Backend (port 8080) ────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/citicup?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-citicup_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      APP_MODEL_SERVICE_BASE_URL: http://model-service:8000
      APP_AGENT_SERVICE_BASE_URL: http://agent-service:8001
      APP_LLM_API_KEY: ${DEEPSEEK_API_KEY}
      APP_OILPRICE_API_TOKEN: ${OIL_PRICE_API_TOKEN}
      APP_PROXY_HOST: ${APP_PROXY_HOST:-}
      APP_PROXY_PORT: ${APP_PROXY_PORT:-7890}
      STAGE2_BASE_URL: http://agent-service:8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - model-service
      - agent-service
    deploy:
      resources:
        limits:
          memory: 700m

  # ── Frontend + Nginx (port 80) ─────────────────────────
  frontend:
    build:
      context: ./frontend-src/frontend
      dockerfile: Dockerfile
      args:
        SERVER_URL: ${SERVER_URL:-http://localhost}
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  redis_data:
