services:
  # ── MySQL ──────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: citicup
      MYSQL_USER: ${MYSQL_USER:-citicup_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/migration:/docker-entrypoint-initdb.d
    command: --innodb-buffer-pool-size=128M --max-connections=50
    deploy:
      resources:
        limits:
          memory: 400m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Model Service (model-remote branch, port 8000) ─────
  model-service:
    build:
      context: ./model-service
      dockerfile: Dockerfile
    restart: always
    environment:
      MODEL_DIR: /app/model-artifacts
      USE_STUB: ${USE_STUB:-0}
    volumes:
      - ./model-artifacts:/app/model-artifacts:ro
    deploy:
      resources:
        limits:
          memory: 400m

  # ── Agent Service (port 8001) ──────────────────────────
  agent-service:
    build:
      context: ./agent-service
    restart: always
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      STAGEX2_MODEL: ${STAGEX2_MODEL:-deepseek-chat}
      STAGEX2_BASE_URL: ${STAGEX2_BASE_URL:-https://api.deepseek.com}
      STAGEX2_SENTIMENT_PROVIDER: ${STAGEX2_SENTIMENT_PROVIDER:-llm}
      STAGEX2_SENTIMENT_BASE_URL: ${STAGEX2_SENTIMENT_BASE_URL:-https://api.deepseek.com/v1}
      STAGEX2_SENTIMENT_MODEL: ${STAGEX2_SENTIMENT_MODEL:-deepseek-chat}
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Spring Boot Backend (port 8080) ────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/citicup?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-citicup_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      APP_MODEL_SERVICE_BASE_URL: http://model-service:8000
      APP_AGENT_SERVICE_BASE_URL: http://agent-service:8001
      APP_LLM_API_KEY: ${DEEPSEEK_API_KEY}
      APP_OILPRICE_API_TOKEN: ${OIL_PRICE_API_TOKEN}
      APP_PROXY_HOST: ${APP_PROXY_HOST:-}
      APP_PROXY_PORT: ${APP_PROXY_PORT:-7890}
      STAGE2_BASE_URL: http://agent-service:8001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      model-service:
        condition: service_started
      agent-service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 700m

  # ── Frontend + Nginx (port 80) ─────────────────────────
  frontend:
    build:
      context: ./frontend-src/frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
