server:
  port: 8080

spring:
  datasource:
    url: YOUR_DB_URL
    username: YOUR_DB_USERNAME
    password: YOUR_DB_PASSWORD
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  model-service:
    base-url: http://localhost:8000  # FastAPI
  cache:
    ttl-seconds: 120

  oilprice:
    api:
      url: https://api.oilpriceapi.com/v1/prices/latest
      token: YOUR_OIL_API_TOKEN
